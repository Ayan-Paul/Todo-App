<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/main.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <main class="container py-5">
    <section class="auth-card card border-0 shadow-sm mx-auto">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 fw-bold mb-1">Sign in</h1>
        <p class="text-secondary mb-4">Use your email or username to access your todos.</p>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">Email or Username</label>
            <input type="text" class="form-control" id="username" name="username" required minlength="3">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required minlength="8">
          </div>
          <button id="submitBtn" type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>

        <hr class="my-4">
        <p class="mb-0 text-secondary">New user? <a href="./register.html">Create an account</a></p>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
