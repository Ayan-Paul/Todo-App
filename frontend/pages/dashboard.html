<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/main.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Todo App</a>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm" type="button">Logout</button>
    </div>
  </nav>

  <main class="container py-4">
    <div id="alertBox" class="alert d-none" role="alert"></div>

    <section class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h5 mb-3">Add Todo</h2>
        <form id="todoForm" class="row g-3" novalidate>
          <div class="col-md-5">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" required minlength="1" maxlength="120">
          </div>
          <div class="col-md-5">
            <label for="description" class="form-label">Description</label>
            <input type="text" class="form-control" id="description" name="description" maxlength="1000">
          </div>
          <div class="col-md-2 d-grid align-self-end">
            <button id="createBtn" type="submit" class="btn btn-primary">Create</button>
          </div>
        </form>
      </div>
    </section>

    <section class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Your Todos</h2>
          <button id="refreshBtn" class="btn btn-outline-secondary btn-sm" type="button">Refresh</button>
        </div>
        <div id="emptyState" class="text-secondary d-none">No todos yet. Create your first task.</div>
        <ul id="todoList" class="list-group list-group-flush"></ul>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.__APP_CONFIG__ = {
      API_BASE_URL: "https://todo-app-scq4.onrender.com/api/v1"
    };
  </script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/dashboard.js"></script>
</body>
</html>
