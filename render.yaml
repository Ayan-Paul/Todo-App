services:
  - type: web
    name: todo-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: DATABASE_URL
        fromDatabase:
          name: todo-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: JWT_ALGORITHM
        value: HS256
      - key: API_V1_PREFIX
        value: /api/v1
      - key: BACKEND_CORS_ORIGINS
        value: ""
      - key: BACKEND_CORS_ORIGIN_REGEX
        value: https://.*\.onrender\.com

  - type: web
    name: todo-ui
    runtime: static
    rootDir: frontend
    staticPublishPath: .

databases:
  - name: todo-postgres
    databaseName: todo
    user: todo_user
