services:
  - type: web
    name: todo-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: DATABASE_URL
        fromDatabase:
          name: todo-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: JWT_ALGORITHM
        value: HS256
      - key: API_V1_PREFIX
        value: /api/v1
      - key: BACKEND_CORS_ORIGINS
        value: '["http://127.0.0.1:5500","http://localhost:5500","https://todo-ui.onrender.com"]'

  - type: static_site
    name: todo-ui
    rootDir: frontend
    buildCommand: ""
    publishPath: .

databases:
  - name: todo-postgres
    databaseName: todo
    user: todo_user
